<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MovieBoyz Fantasy Box Office</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tabulator Bootstrap5 theme -->
  <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">

  <!-- App styles -->
  <link href="css/style.css" rel="stylesheet">

  <!-- Restore theme before first paint to avoid flash -->
  <script>
    (function () {
      var saved = localStorage.getItem('mbTheme') || 'dark';
      document.documentElement.setAttribute('data-bs-theme', saved);
    })();
  </script>
</head>

<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-sm mb-3 border-bottom">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">🎬 MovieBoyz</span>
    <div class="d-flex flex-wrap align-items-center gap-3 ms-auto">
      <div class="navbar-status text-muted d-none" style="font-size:0.82rem">
        <span id="latest-gross-date"></span>
        <span class="navbar-status-sep">·</span>
        <span id="latest-gross-updated"></span>
      </div>
      <div class="form-check form-switch mb-0">
        <input class="form-check-input" type="checkbox" id="themeSwitch">
        <label class="form-check-label" for="themeSwitch">Light</label>
      </div>
    </div>
  </div>
</nav>

<!-- ── Main ───────────────────────────────────────────────────────────── -->
<div class="container-fluid px-3">

  <!-- Top Panel: Scorecard Strip + Info Cards -->
  <div class="top-panel mb-4">
    <div id="weekend-strip"></div>
    <div id="info-cards"></div>
  </div>

  <!-- Chart -->
  <div class="d-flex align-items-center justify-content-between mb-2">
    <h6 id="chart-heading" class="text-uppercase text-muted fw-semibold mb-0" style="letter-spacing:.08em">Profit Over Time</h6>
    <div class="d-flex gap-2">
      <button id="reset-zoom" class="btn btn-sm btn-outline-secondary py-0" style="font-size:0.75rem">Reset zoom</button>
      <button id="fullscreen-chart" class="btn btn-sm btn-outline-secondary py-0" title="Fullscreen" aria-label="Toggle fullscreen chart">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="chart-wrapper" class="mb-4">
    <button id="fullscreen-close" class="btn btn-sm btn-outline-secondary py-0" aria-label="Exit fullscreen">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <canvas id="profitChart"></canvas>
  </div>

  <!-- Owner filter -->
  <div id="owner-filter" class="d-flex flex-wrap gap-2 align-items-center mb-2"></div>

  <!-- Release date filter -->
  <div id="date-filter" class="d-flex align-items-center gap-2 mb-2" style="font-size:0.82rem">
    <span class="text-muted">Release:</span>
    <input type="date" id="date-from" class="form-control form-control-sm" style="width:auto" aria-label="From date">
    <span class="text-muted">to</span>
    <input type="date" id="date-to" class="form-control form-control-sm" style="width:auto" aria-label="To date">
  </div>

  <!-- Movie table -->
  <div id="table-wrapper">
    <div class="d-flex align-items-center justify-content-between mb-1">
      <span class="text-muted" style="font-size:0.78rem">Click rows to plot on chart</span>
      <button id="clear-movie-selection" class="btn btn-sm btn-outline-secondary py-0 d-none" style="font-size:0.75rem">Reset</button>
    </div>
    <div id="movie-table"></div>
    <p id="daily-neg-footnote" class="d-none">* Negative daily gross values are not true negatives. They reflect revised estimates for earlier days in the week, superseded by more accurate figures.</p>
  </div>

</div>

<!-- ── Footer ─────────────────────────────────────────────────────────── -->
<div class="container-fluid px-3 mt-3 pb-3 border-top pt-2 d-flex align-items-end justify-content-between">
  <div>
    <small class="text-muted d-block" id="data-updated"></small>
    <small class="text-muted d-block" id="site-updated"></small>
  </div>
  <small><a href="/changelog.html" class="text-muted text-decoration-none">What's new</a></small>
</div>

<!-- ── Scripts ────────────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
